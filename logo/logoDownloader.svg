<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo circular -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)" opacity="0.1"/>
  
  <!-- Rectángulo principal (pantalla/video) -->
  <rect x="40" y="50" width="120" height="80" rx="8" fill="url(#grad1)" stroke="#fff" stroke-width="3"/>
  
  <!-- Símbolo de play en el centro -->
  <path d="M 85 70 L 85 110 L 120 90 Z" fill="#fff" opacity="0.9"/>
  
  <!-- Flecha de descarga -->
  <g transform="translate(100, 145)">
    <!-- Línea vertical -->
    <rect x="-4" y="-15" width="8" height="35" rx="2" fill="url(#grad2)"/>
    <!-- Punta de flecha -->
    <path d="M -15 15 L 0 30 L 15 15 Z" fill="url(#grad2)"/>
  </g>
  
  <!-- Detalles decorativos (puntos que representan múltiples plataformas) -->
  <circle cx="30" cy="35" r="4" fill="#667eea" opacity="0.6"/>
  <circle cx="170" cy="35" r="4" fill="#764ba2" opacity="0.6"/>
  <circle cx="30" cy="165" r="4" fill="#f5576c" opacity="0.6"/>
  <circle cx="170" cy="165" r="4" fill="#f093fb" opacity="0.6"/>
</svg>